<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion des utilisateurs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      padding-top: 30px;
    }

    .badge-php {
      background-color: #6c757d;
      font-size: 0.7rem;
      padding: 5px 10px;
    }

    .table thead {
      background-color: #212529;
      color: white;
    }

    .card {
      border: 1px solid #dee2e6;
      border-radius: 0.25rem;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="d-flex justify-content-between align-items-start mb-4">
      <div>
        <h1 class="fw-bold h2 mb-1">Gestion des utlisateurs</h1>
        <span class="badge badge-php rounded-pill">Intro avant PHP</span>
      </div>
      <button class="btn btn-primary btn-sm px-3">
        + Ajouter un utilisateur
      </button>
    </div>

    <div class="row g-4">
      <div class="col-md-5 col-lg-4">
        <div class="card p-4 shadow-sm bg-white">
          <h5 class="mb-3 fw-bold">fomrulaire d'ajout des utilisateurs</h5>
          <form>
            <div class="mb-3">
              <label class="form-label text-secondary small">Nom</label>
              <input type="text" class="form-control form-control-sm" placeholder="Ex: Nom prenom">
            </div>
            <div class="mb-3">
              <label class="form-label text-secondary small">Email</label>
              <input type="email" class="form-control form-control-sm" placeholder="Ex: email@test.com">
            </div>
            <div class="mb-3">
              <label class="form-label text-secondary small">Rôle</label>
              <select class="form-select form-select-sm">
                <option selected>-- Choisir --</option>
                <option value="admin">Admin</option>
                <option value="user">User</option>
              </select>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary btn-sm px-3">Ajouter</button>
              <button type="reset" class="btn btn-outline-secondary btn-sm px-3">Réinitialiser</button>
            </div>
          </form>
        </div>
      </div>

      <div class="col-md-7 col-lg-8">
        <div class="card p-4 shadow-sm bg-white">
          <h5 class="mb-3 fw-bold">Liste des utilisateurs</h5>
          <div class="table-responsive">
            <table class="table table-bordered align-middle mb-0">
              <thead class="table-dark">
                <tr>
                  <th>id</th>
                  <th>Nom</th>
                  <th>Email</th>
                  <th>Rôle</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>1</td>
                  <td>Barhoumi</td>
                  <td>Barhoumi@test.com</td>
                  <td><span class="badge bg-danger rounded-pill px-3">Admin</span></td>
                  <td>
                    <button class="btn btn-warning btn-sm text-dark fw-semibold me-1">Modifier</button>
                    <button class="btn btn-danger btn-sm">Supprimer</button>
                  </td>
                </tr>
                <tr>
                  <td>2</td>
                  <td>Barhoumi</td>
                  <td>Barhoumi@test.com</td>
                  <td><span class="badge bg-secondary rounded-pill px-3">Admin</span></td>
                  <td>
                    <button class="btn btn-warning btn-sm text-dark fw-semibold me-1">Modifier</button>
                    <button class="btn btn-danger btn-sm">Supprimer</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
